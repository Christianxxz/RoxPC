<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro - RoxPC</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: radial-gradient(circle at top, #2d1b4d, #0f0f0f);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen text-white">

<div class="w-full max-w-md p-8 rounded-2xl backdrop-blur-lg bg-white/5 border border-white/10 shadow-2xl">

    <h1 class="text-3xl font-bold text-center mb-2 bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">
        Criar Conta
    </h1>

    <p class="text-center text-gray-400 mb-6">
        Junte-se à RoxPC
    </p>

    <!-- ERRO -->
    <div id="erro" class="hidden bg-red-500/20 text-red-300 p-3 rounded mb-4 text-sm"></div>

    <!-- NOME -->
    <input id="nome" type="text" placeholder="Nome completo"
    class="w-full p-3 mb-4 rounded bg-black/40 border border-white/10 focus:border-purple-500 outline-none">

    <!-- EMAIL -->
    <input id="email" type="email" placeholder="Email"
    class="w-full p-3 mb-4 rounded bg-black/40 border border-white/10 focus:border-purple-500 outline-none">

    <!-- SENHA -->
    <div class="relative mb-4">
        <input id="senha" type="password" placeholder="Senha"
        class="w-full p-3 rounded bg-black/40 border border-white/10 focus:border-purple-500 outline-none">

        <span onclick="toggleSenha('senha')"
        class="absolute right-3 top-3 cursor-pointer text-gray-400 hover:text-white">
        👁️
        </span>
    </div>

    <!-- CONFIRMAR -->
    <div class="relative mb-6">
        <input id="confirmar" type="password" placeholder="Confirmar senha"
        class="w-full p-3 rounded bg-black/40 border border-white/10 focus:border-purple-500 outline-none">

        <span onclick="toggleSenha('confirmar')"
        class="absolute right-3 top-3 cursor-pointer text-gray-400 hover:text-white">
        👁️
        </span>
    </div>

    <!-- BOTÃO -->
    <button onclick="register()"
    class="w-full py-3 rounded-lg bg-gradient-to-r from-purple-600 to-pink-600 hover:scale-105 transition font-bold">
        Criar conta
    </button>

    <!-- LINK LOGIN -->
    <p class="text-center text-gray-400 mt-4 text-sm">
        Já tem conta?
        <a href="login.html" class="text-purple-400 hover:underline">Entrar</a>
    </p>

</div>

<script>
const API = "http://localhost:8080";

function toggleSenha(id){
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

function mostrarErro(msg){
    const erro = document.getElementById("erro");
    erro.innerText = msg;
    erro.classList.remove("hidden");
}

function register(){

    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const confirmar = document.getElementById("confirmar").value;

    if(!nome || !email || !senha || !confirmar){
        return mostrarErro("Preencha todos os campos");
    }

    if(senha !== confirmar){
        return mostrarErro("As senhas não coincidem");
    }

    fetch(`${API}/auth/register`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ nome, email, senha })
    })
    .then(res => res.json())
    .then(data => {

        if(data.erro){
            return mostrarErro(data.erro);
        }

        alert("Conta criada com sucesso!");

        window.location.href = "login.html";
    })
    .catch(() => {
        mostrarErro("Erro ao conectar com servidor");
    });
}
</script>

</body>
</html>
