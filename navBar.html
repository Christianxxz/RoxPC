<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoxPC</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icons/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <nav class="flex items-center justify-between bg-[#111] px-10 py-7 border-b-2 border-purple-600">

        <!-- LOGO -->
        <div class="flex items-center gap-3">
            <a href="index.html">
                <img src="icons/logo.png" alt="Logo" class="w-[70px]">
                <span class="text-purple-500 text-2xl font-bold tracking-wide">
                    RoxPC
                </span>
            </a>
        </div>

        <!-- SEARCH -->
        <div class="flex items-center bg-[#1a1a1a] px-4 py-2 rounded-full border border-purple-600 w-[300px]">

            <input type="text" placeholder="Buscar produtos..."
                class="bg-transparent outline-none text-white w-full text-sm">

            <button class="ml-2 bg-purple-600 p-2 rounded-full hover:bg-purple-500 transition">
                <img src="icons/lupa.png" class="w-4 invert">
            </button>

        </div>
        <!-- MENU -->
        <ul class="flex gap-6">
            <li><a href="processadores.html" class="hover:text-purple-500 transition">Processadores</a></li>
            <li><a href="gpu.html" class="hover:text-purple-500 transition">Placas de Vídeo</a></li>
            <li><a href="ram.html" class="hover:text-purple-500 transition">Memória RAM</a></li>
            <li><a href="ssd.html" class="hover:text-purple-500 transition">SSD</a></li>
        </ul>

        <!-- ICONS -->
        <div class="flex items-center gap-4">
            <a href="#">
                <img src="icons/usuario.png" alt="Usuário"
                    class="w-9 invert cursor-pointer hover:drop-shadow-[0_0_6px_#4c0bad] transition">
            </a>

            <div class="relative">
                <img src="icons/carrinho.png" class="w-9 invert cursor-pointer">

                <span class="absolute -top-2 -right-2 bg-purple-600 text-xs px-2 py-[2px] rounded-full">
                </span>
            </div>

        </div>

    </nav>
</body>

</html>
