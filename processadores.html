<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processadores</title>
</head>
<body>
    <!-- HERO DA CATEGORIA -->
<section class="hero categoria-hero">
    <h1>Processadores</h1>
    <p>Escolha entre os melhores CPUs da Intel e AMD</p>
</section>

<!-- PRODUTOS -->
<section class="destaques-section">
    <h1 class="title-destaques">Processadores em Destaque</h1>

    <div class="destaques">

        <div class="card-destaques">
            <div class="desq-wrapper">
                <img src="icons/5700x.png" class="desq-icon">
            </div>
            <h4>AMD</h4>
            <span>Ryzen 7 5700X</span>
            <p>8 núcleos, 16 threads</p>

            <div class="price-area">
                <span class="new-price">R$ 1.299,90</span>
            </div>
        </div>

        <div class="card-destaques">
            <div class="desq-wrapper">
                <img src="icons/i5.png" class="desq-icon">
            </div>
            <h4>Intel</h4>
            <span>Core i5 12400F</span>
            <p>6 núcleos, 12 threads</p>

            <div class="price-area">
                <span class="new-price">R$ 899,90</span>
            </div>
        </div>

        <div class="card-destaques promo">
            <div class="discount-badge">-20%</div>
            <div class="desq-wrapper">
                <img src="icons/i7.png" class="desq-icon">
            </div>
            <h4>Intel</h4>
            <span>Core i7 12700K</span>
            <p>Alto desempenho</p>

            <div class="price-area">
                <span class="old-price">R$ 2.299,90</span>
                <span class="new-price">R$ 1.839,90</span>
            </div>
        </div>

    </div>
</section>
</body>
</html>
