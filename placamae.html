<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placa Mãe | RoxPC</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tema Rox -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rox: "#9F5FFF",
                        roxDark: "#231936",
                        roxBg: "#1a1919",
                        roxCard: "#341644"
                    }
                }
            }
        }
    </script>

</head>

<body class="bg-roxBg text-white">

    <!-- NAVBAR -->
    <div id="navBar"></div>

    <!-- HEADER -->
    <section class="px-10 py-10 border-b border-rox">
        <h1 class="text-3xl font-bold text-rox">Processadores</h1>
        <p class="text-gray-400">Confira os melhores CPUs disponíveis</p>
    </section>

    <!-- PRODUTOS -->
    <section class="p-10">
        <div id="produtos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
        </div>
    </section>

    <!-- FOOTER -->
    <div id="footer"></div>

    <script>
        // NAVBAR
        fetch("navBar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navBar").innerHTML = data;
            });

        // FOOTER
        fetch("footer.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("footer").innerHTML = data;
            });

        // 🔥 CATEGORIA DA PÁGINA
        const slugCategoria = "placamae";

        fetch("http://localhost:8080/categorias")
            .then(res => res.json())
            .then(categorias => {

                const categoria = categorias.find(c =>
                    c.slug.toLowerCase() === slugCategoria
                );

                if (!categoria) {
                    console.error("Categoria não encontrada");
                    return;
                }

                return fetch(`http://localhost:8080/produtos/categoria/${categoria.id}`);
            })
            .then(res => res.json())
            .then(produtos => renderProdutos(produtos))
            .catch(err => {
                console.error("Erro ao buscar produtos:", err);
            });

        function renderProdutos(produtos) {
            const container = document.getElementById("produtos");

            container.innerHTML = "";

            produtos.forEach(p => {
                const card = `
                <a href="PDP.html?id=${p.id}"
   class="flex flex-col border-2 border-purple-600 rounded-xl p-5 hover:bg-purple-700 transition cursor-pointer">
                    <img src="${p.imagem_url}" alt="${p.nome}" class="w-[150px] mx-auto mb-3">

                    <h4 class="text-rox text-sm">${p.categoria}</h4>
                    <span class="font-bold">${p.nome}</span>
                    <p class="text-gray-400 text-sm">${p.descricao}</p>

                    <div class="mt-auto">
                        <span class="text-green-400 text-xl">R$ ${p.preco_promocao}</span>
                    </div>

                </a>
            `;

                container.innerHTML += card;
            });
        }
    </script>

</body>

</html>
