<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho - RoxPC</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                rox: "#9F5FFF",
                roxDark: "#231936",
                roxBg: "#1a1919",
                roxCard: "#341644"
            }
        }
    }
}
</script>
</head>

<body class="bg-roxBg text-white">

<section class="p-10">

    <h1 class="text-3xl mb-8">Seu Carrinho</h1>

    <div id="carrinho" class="space-y-4"></div>

    <div class="mt-10 text-right">
        <h2 class="text-xl">Total: <span id="total" class="text-green-400"></span></h2>
    </div>

</section>

<script>
const API = "http://localhost:8080";

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
    alert("Faça login primeiro");
    window.location.href = "login.html";
}

// carregar carrinho
fetch(`${API}/carrinho/${user.id}`)
.then(res => res.json())
.then(items => {

    const container = document.getElementById("carrinho");

    let total = 0;

    items.forEach(item => {

        total += item.preco_original * item.quantidade;

        container.innerHTML += `
        <div class="flex justify-between bg-roxCard p-4 rounded">

            <div class="flex items-center gap-4">
                <img src="${item.imagem_url}" class="w-16">
                <div>
                    <p>${item.nome}</p>
                    <small>Qtd: ${item.quantidade}</small>
                </div>
            </div>

            <div class="text-right">
                <p>R$ ${item.preco_original}</p>
                <button onclick="remover(${item.id})"
                class="text-red-400 text-sm">Remover</button>
            </div>

        </div>
        `;
    });

    document.getElementById("total").innerText = "R$ " + total;
});

// remover item
function remover(id){

    fetch(`${API}/carrinho/${id}`, {
        method: "DELETE"
    })
    .then(() => location.reload());
}
</script>

</body>
</html>
